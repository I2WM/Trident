# general settings
name: 001_HAT-L_3DSRx4_from_pretrain_test_tta
model_type: HATModel
scale: 4
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  test_1:  # the 1st test dataset
    name: WestAccommodationAreas
    type: SingleImageDataset
#    dataroot_gt: ./datasets/Set5/HR/x4
    dataroot_lq: /path/to/track1/WestAccommodationAreas/rgb
    io_backend:
      type: disk
  test_2: # the 2st test dataset
    name: WestResearchAreas
    type: SingleImageDataset
    dataroot_lq: /path/to/track1/WestResearchAreas/rgb
    io_backend:
      type: disk
  test_3: # the 3st test dataset
    name: WestTeachingAreas
    type: SingleImageDataset
    dataroot_lq: /path/to/track1/WestTeachingAreas/rgb
    io_backend:
      type: disk


# network structures
network_g:
  type: HAT
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /path/to/HAT/experiments/HAT-L_x4.pth
  param_key_g: 'params_ema'
  strict_load_g: true
  resume_state: ~

# validation settings
val:
  save_img: true
  suffix: 'hat'  # add suffix to saved images, if None, use exp name
