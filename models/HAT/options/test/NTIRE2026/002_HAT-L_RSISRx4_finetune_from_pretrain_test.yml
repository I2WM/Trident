# general settings
name: 002_HAT-L_RSISRx4_finetune_from_pretrain_test_140k
model_type: HATModel
scale: 4
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:

  test_1:
    name: Set5
    type: SingleImageDataset
#    dataroot_gt: ./datasets/Set5/GTmod4
    dataroot_lq: /path/to/data/ntire2026/01denoise/RSISR/val_LR_X4/X4
    io_backend:
      type: disk


# network structures
network_g:
  type: HAT
  upscale: 4
  in_chans: 3
  img_size: 64
#  window_size: 16
  window_size: 32
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /path/to/HAT/experiments/002_HAT-L_RSISRx4_finetune_from_pretrain/models/net_g_140000.pth
  param_key_g: 'params_ema'
  strict_load_g: true
  resume_state: ~

# validation settings
val:
  save_img: true
  suffix: 'hat'  # add suffix to saved images, if None, use exp name
