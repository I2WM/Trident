# general settings
name: My_train_HAT-L_SRx4_DIV2K_from_scratch_L1
model_type: HATModel
scale: 4
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
#    name: DF2K
#    type: PairedImageDataset
#    dataroot_gt: datasets/DF2K/DF2K_HR_sub
#    dataroot_lq: datasets/DF2K/DF2K_bicx4_sub
#    meta_info_file: hat/data/meta_info/meta_info_DF2Ksub_GT.txt
#    io_backend:
#      type: disk

    name: DIV2K
    type: PairedImageDataset
    dataroot_gt: datasets/DIV2K/DIV2K_train_HR_sub.lmdb
    dataroot_lq: datasets/DIV2K/DIV2K_train_LR_bicubic_X4_sub.lmdb
#    meta_info_file: hat/data/meta_info/meta_info_DF2Ksub_GT.txt
    meta_info_file: datasets/DIV2K/DIV2K_train_LR_bicubic_X4_sub.lmdb/meta_info.txt
    io_backend:
      type: lmdb

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
#    batch_size_per_gpu: 4
#    batch_size_per_gpu: 16
#    batch_size_per_gpu: 12
#    batch_size_per_gpu: 8
#    batch_size_per_gpu: 1
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: DIV2K_valid
    type: PairedImageDataset
    dataroot_gt: datasets/DIV2K/DIV2K_valid_HR
    dataroot_lq: datasets/DIV2K/DIV2K_valid_LR_bicubic_X4
    io_backend:
      type: disk

#  val_1:
#    name: Set5
#    type: PairedImageDataset
#    dataroot_gt: ./datasets/Set5/GTmod4
#    dataroot_lq: ./datasets/Set5/LRbicx4
#    io_backend:
#      type: disk
#
#  val_2:
#    name: Set14
#    type: PairedImageDataset
#    dataroot_gt: ./datasets/Set14/GTmod4
#    dataroot_lq: ./datasets/Set14/LRbicx4
#    io_backend:
#      type: disk

  # val_3:
  #   name: Urban100
  #   type: PairedImageDataset
  #   dataroot_gt: ./datasets/urban100/GTmod4
  #   dataroot_lq: ./datasets/urban100/LRbicx4
  #   io_backend:
  #     type: disk


# network structures
network_g:
  type: HAT
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
#  pretrain_network_g: ./experiments/train_HAT-L_SRx4_ImageNet_from_scratch/models/net_g_latest.pth
  pretrain_network_g: ~
  param_key_g: 'params_ema'
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
#    lr: !!float 2e-4
    lr: !!float 2e-3
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
#    milestones: [300000, 500000, 650000, 700000, 750000]
    milestones: [30000, 50000, 100000, 150000, 175000]
    gamma: 0.5

#  total_iter: 800000
#  total_iter: 100000
  total_iter: 200000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
#  val_freq: !!float 1e4 # 10k
  val_freq: !!float 2e4 # 20k
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
#      crop_border: 2
      crop_border: 0
      #      test_y_channel: true
      test_y_channel: false
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
#      crop_border: 2
      crop_border: 0
      #      test_y_channel: true
      test_y_channel: false
      better: higher  # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 100
#  save_checkpoint_freq: !!float 1e4 # 10k
  save_checkpoint_freq: !!float 2e4 # 20k
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500