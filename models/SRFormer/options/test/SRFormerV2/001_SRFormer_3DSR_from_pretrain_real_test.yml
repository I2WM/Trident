# network structures
network_g:
  type: SRFormer
  upscale: 4
  in_chans: 3
  img_size: 48
  window_size: 24
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

