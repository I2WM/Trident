name: 001_SRFormer_3DSR_from_pretrain_real_test
suffix: ~  # add suffix to saved images
model_type: SRModel
scale: 4
num_gpu: 2  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:  # the 1st test dataset
    name: WestAccommodationAreas
    type: SingleImageDataset
#    dataroot_gt: ./datasets/Set5/HR/x4
    dataroot_lq: /path/to/track2/WestAccommodationAreas/rgb
    io_backend:
      type: disk
  test_2: # the 2st test dataset
    name: WestResearchAreas
    type: SingleImageDataset
    dataroot_lq: /path/to/track2/WestResearchAreas/rgb
    io_backend:
      type: disk
  test_3: # the 3st test dataset
    name: WestTeachingAreas
    type: SingleImageDataset
    dataroot_lq: /path/to/track2/WestTeachingAreas/rgb
    io_backend:
      type: disk

