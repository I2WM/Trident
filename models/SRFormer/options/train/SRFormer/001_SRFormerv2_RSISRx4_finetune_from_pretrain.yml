# general settings
name: 001_SRFormerv2_RSISRx4_finetune_from_pretrain
model_type: SwinIRModel
scale: 4
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: RSISR
    type: PairedImageDataset
    dataroot_gt: /path/to/data/ntire2026/01denoise/RSISR/HR
    dataroot_lq: /path/to/data/ntire2026/01denoise/RSISR/train_LR_X4
    filename_tmpl: '{}'
    io_backend:
      type: disk
    gt_size: 192
    use_hflip: true
    use_rot: true

    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~


#  val_1:
#    name: Set5
#    type: PairedImageDataset
#    dataroot_gt: ./datasets/Set5/HR/x4
#    dataroot_lq: ./datasets/Set5/LR/LRBI/x4
#    io_backend:
#      type: disk


network_g:
  type: SRFormerv2
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 36
  squeeze_dim: 60
  img_range: 1.0
  depths: [4, 4, 4, 4, 4, 4]
  embed_dim: 240
  num_heads: [8, 8, 8, 8, 8, 8]
  mlp_ratio: 2
  upsampler: pixelshuffle
  resi_connection: 1conv

print_network: false
# pretrain path
path:
  pretrain_network_g: experiments/SRFormerv2_x4.pth
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
#    lr: !!float 2e-4
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e6
  save_img: false

#  metrics:
#    psnr: # metric name, can be arbitrary
#      type: calculate_psnr
#      crop_border: 4
#      test_y_channel: true
#    ssim:
#      type: calculate_ssim
#      crop_border: 4
#      test_y_channel: true

# logging settings
logger:
  print_freq: 1000
#  save_checkpoint_freq: !!float 5e3
  save_checkpoint_freq: !!float 25000
  use_tb_logger: false
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 28500
